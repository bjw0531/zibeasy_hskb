# ============================================================
# HouseKB Nginx 설정 파일
# house.zibeasy.com
#
# 최적화 항목:
# - 정적 파일 직접 서빙 (CSS, JS, 이미지)
# - gzip 압축 활성화
# - 브라우저 캐싱 설정
# - 보안 헤더 추가
# ============================================================

server {
    server_name house.zibeasy.com;

    # ============ 정적 파일 직접 서빙 ============
    # CSS 파일 (1주일 캐시)
    location /static/css/ {
        alias /home/ubuntu/housekb/static/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # JavaScript 파일 (1주일 캐시)
    location /static/js/ {
        alias /home/ubuntu/housekb/static/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 정적 이미지 (아이콘 등, 1달 캐시)
    location /static/images/ {
        alias /home/ubuntu/housekb/static/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 지도 데이터 (GeoJSON, 1주일 캐시)
    location /static/map_data/ {
        alias /home/ubuntu/housekb/static/map_data/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # 매물 이미지 (1일 캐시 - 자주 업데이트됨)
    location /images/maemul/ {
        alias /home/ubuntu/housekb/data/maemul/;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;

        # 이미지가 없을 경우 no-image.png 반환
        try_files $uri /static/images/no-image.png;
    }

    # ============ Flask 앱으로 프록시 ============
    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 이미지 업로드 허용 크기: 20MB (사진 1장당 1MB × 최대 20장)
        client_max_body_size 20m;

        # 프록시 타임아웃 설정 (이미지 업로드 고려해 120s로 증가)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ============ gzip 압축 ============
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;
    gzip_comp_level 6;

    # ============ 보안 헤더 ============
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ============ SSL 설정 (Let's Encrypt) ============
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/re.zibeasy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/re.zibeasy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP → HTTPS 리다이렉트
server {
    if ($host = house.zibeasy.com) {
        return 301 https://$host$request_uri;
    }

    server_name house.zibeasy.com;
    listen 80;
    return 404;
}
