<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>찜 목록 초기화</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            opacity: 0.9;
            margin-bottom: 30px;
        }

        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: scale(0.95);
        }

        .result {
            margin-top: 20px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: none;
        }

        .back-link {
            margin-top: 30px;
            color: white;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <h1>🗑️ 찜 목록 초기화</h1>
    <p>localStorage와 쿠키에 저장된 찜 목록을 모두 삭제합니다.</p>

    <button onclick="clearAll()">초기화 실행</button>

    <div class="result" id="result"></div>

    <a class="back-link" href="/">← 메인으로 돌아가기</a>

    <script>
        function clearAll() {
            // 1. localStorage 삭제
            localStorage.removeItem('liked');

            // 2. 쿠키 삭제 (만료일을 과거로 설정)
            document.cookie = 'liked=; path=/; max-age=0';
            document.cookie = 'liked=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC';

            // 3. 확인
            const localCheck = localStorage.getItem('liked');
            const cookieCheck = document.cookie.includes('liked=');

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            if (!localCheck && !cookieCheck) {
                resultDiv.innerHTML = '✅ 초기화 완료!<br><br>이제 메인으로 돌아가서 관심목록을 확인해보세요.';
            } else {
                resultDiv.innerHTML = '⚠️ 일부 데이터가 남아있을 수 있습니다.<br>localStorage: ' + (localCheck || '없음') + '<br>쿠키: ' + (cookieCheck ? '있음' : '없음');
            }
        }
    </script>
</body>

</html>
