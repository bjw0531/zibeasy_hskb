<!-- viewport는 index.html/view.html에서 설정 (중복 방지) -->
<meta name="csrf-token" content="{{ csrf_token }}">

<script>
(function () {
  if (!window.fetch) return;
  var tokenMeta = document.querySelector('meta[name="csrf-token"]');
  var csrfToken = tokenMeta ? tokenMeta.getAttribute('content') : '';
  if (!csrfToken) return;

  var originalFetch = window.fetch;
  var unsafeMethods = { POST: true, PUT: true, PATCH: true, DELETE: true };

  window.fetch = function (input, init) {
    init = init || {};
    var method = String(init.method || 'GET').toUpperCase();
    if (!unsafeMethods[method]) {
      return originalFetch(input, init);
    }

    var rawUrl = (typeof input === 'string') ? input : (input && input.url ? input.url : '');
    try {
      var urlObj = new URL(rawUrl || window.location.href, window.location.href);
      if (urlObj.origin === window.location.origin) {
        var headers = new Headers(init.headers || {});
        if (!headers.has('X-CSRF-Token')) {
          headers.set('X-CSRF-Token', csrfToken);
        }
        init.headers = headers;
        if (!init.credentials) init.credentials = 'same-origin';
      }
    } catch (e) {}

    return originalFetch(input, init);
  };
})();
</script>

<!-- ✅ View Transitions: pagereveal 지원 브라우저에서만 @view-transition 활성화
     WebView는 CSS @view-transition을 인식하지만 pagereveal을 지원하지 않아
     폴백 애니메이션(pushState+popstate)이 방해받는 문제 방지 -->
<script>
if ('onpagereveal' in window) {
    var s = document.createElement('style');
    s.textContent = '@view-transition { navigation: auto; }';
    document.head.appendChild(s);
}
</script>
