<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>관리자 로그인 · HouseKB</title>
  <style>
    /* ── 리셋 및 기본 ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1e1b28;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      overflow: hidden;
    }

    /* ── 배경 그라데이션 애니메이션 ── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1e1b28 0%, #271f38 50%, #1e1b28 100%);
      z-index: 0;
    }

    /* ── 배경 블러 원형 장식 ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.28;
      animation: float 8s ease-in-out infinite;
      z-index: 0;
    }

    .blob-1 {
      width: 400px;
      height: 400px;
      background: #FF7075;
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 300px;
      height: 300px;
      background: #FF4F56;
      bottom: -80px;
      right: -80px;
      animation-delay: 3s;
    }

    .blob-3 {
      width: 200px;
      height: 200px;
      background: #FF9B9E;
      top: 50%;
      left: 60%;
      animation-delay: 5s;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-30px) scale(1.05);
      }
    }

    /* ── 로그인 카드 ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      margin: 1rem;
      padding: 2.5rem 2rem;
      background: rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 1.5rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    }

    /* ── 로고 영역 ── */
    .logo-wrap {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #FF7075, #FF4F56);
      border-radius: 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 8px 24px rgba(255, 112, 117, 0.4);
    }

    .logo-icon svg {
      width: 32px;
      height: 32px;
      fill: white;
    }

    .logo-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-sub {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 0.25rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── 에러 메시지 ── */
    .error-box {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      color: #fca5a5;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ── 폼 필드 ── */
    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      fill: rgba(255, 255, 255, 0.35);
      pointer-events: none;
    }

    .field input {
      width: 100%;
      padding: 0.75rem 0.875rem 0.75rem 2.75rem;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 0.75rem;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .field input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .field input:focus {
      border-color: #FF7075;
      background: rgba(255, 112, 117, 0.1);
      box-shadow: 0 0 0 3px rgba(255, 112, 117, 0.2);
    }

    /* ── 로그인 버튼 ── */
    .btn-login {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.875rem;
      background: linear-gradient(135deg, #FF7075, #FF4F56);
      border: none;
      border-radius: 0.75rem;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: -0.3px;
      box-shadow: 0 8px 20px rgba(255, 112, 117, 0.35);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      -webkit-appearance: none;
    }

    .btn-login:active {
      transform: scale(0.98);
      box-shadow: 0 4px 12px rgba(255, 112, 117, 0.25);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ── 로딩 스피너 ── */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── 하단 안내 ── */
    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.25);
    }

    /* ── 모바일 조정 ── */
    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem;
      }

      .blob-1 {
        width: 250px;
        height: 250px;
      }

      .blob-2 {
        width: 200px;
        height: 200px;
      }

      .blob-3 {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- 배경 -->
  <div class="bg-gradient"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- 로그인 카드 -->
  <div class="card">

    <!-- 로고 -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <!-- 집 모양 아이콘 -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
        </svg>
      </div>
      <div class="logo-title">HouseKB</div>
      <div class="logo-sub">Admin Console</div>
    </div>

    <!-- 에러 메시지 -->
    {% if error %}
    <div class="error-box">
      <!-- 경고 아이콘 -->
      <svg viewBox="0 0 24 24" width="18" height="18" fill="#f87171">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <!-- 로그인 폼 -->
    <form method="POST" action="{{ url_for('admin.login') }}" id="loginForm">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <!-- 아이디 -->
      <div class="field">
        <label for="id">아이디</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" />
          </svg>
          <input type="text" id="id" name="id" placeholder="관리자 아이디" autocomplete="username" required />
        </div>
      </div>

      <!-- 비밀번호 -->
      <div class="field">
        <label for="pass">비밀번호</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24">
            <path
              d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z" />
          </svg>
          <input type="password" id="pass" name="pass" placeholder="비밀번호" autocomplete="current-password" required />
        </div>
      </div>

      <!-- 로그인 버튼 -->
      <button type="submit" class="btn-login" id="loginBtn">
        <span id="btnText">로그인</span>
        <div class="spinner" id="spinner"></div>
      </button>

    </form>

    <div class="footer-note">HouseKB 관리자 전용 페이지입니다</div>
  </div>

  <script>
    // 폼 제출 시 로딩 스피너 표시
    document.getElementById('loginForm').addEventListener('submit', function () {
      const btn = document.getElementById('loginBtn');
      const text = document.getElementById('btnText');
      const spin = document.getElementById('spinner');
      btn.disabled = true;
      text.style.display = 'none';
      spin.style.display = 'block';
    });
  </script>

</body>

</html>
